PART
{
	name = hxmt_hard_xray_telescope
	module = Part
	author = SRP
	MODEL
	{
	model = RealChinasProbeExplore/Parts/EarthProbe/HXMT/HXMT
	scale = 1.0, 1.0, 1.0
	}
	mesh = HXMT
	rescaleFactor = 1

	node_stack_bottom = 0, -1.09, 0, 0.0, -1.0, 0.0, 1
	node_stack_top = 0, 1.7, 0, 0.0, 1.0, 0.0, 1
	techRequired = advScienceTech
	entryCost = 50
	cost = 660
	category = Pods
	subcategory = 0
	title = #EarthProbe_HXMT_title
	manufacturer = #EarthProbe_HXMT_manufacturer
	description = #EarthProbe_HXMT_description
	attachRules = 1,0,1,1,0
	mass = 2.5
	dragModelType = default
	maximum_drag = 0.2
	minimum_drag = 0.15
	angularDrag = 2
	crashTolerance = 20
	maxTemp = 2000
	breakingForce = 2000
	breakingTorque = 2000
	thermalMassModifier = 2.0
	emissiveConstant = 0.95
	heatConductivity = 0.04

	CrewCapacity = 0
	vesselType = Probe

	MODULE
	{
 	name = ModuleCommand
 	minimumCrew = 0
		RESOURCE
		{
		name = ElectricCharge
		rate = 0.01
		}

	}
	MODULE
	{
		name = ModuleReactionWheel
	
		PitchTorque = 1
		YawTorque = 1
		RollTorque = 1
	
		RESOURCE
		{
			name = ElectricCharge
			rate = 0.05
		}
	}
	MODULE
	{
	name = ModuleSAS
	SASServiceLevel = 3
	}
	RESOURCE
	{
	name = ElectricCharge
	amount = 500
	maxAmount = 500
	}

	RESOURCE
	{
	name = MonoPropellant
	amount = 30
	maxAmount = 30
	}


	MODULE
	{
		name = ModuleRCSFX
		stagingEnabled = False
		thrusterTransformName = RCSthruster
		thrusterPower = 0.2
		resourceName = MonoPropellant
		resourceFlowMode = STAGE_PRIORITY_FLOW
		runningEffectName = running
		atmosphereCurve
		{
			key = 0 222
			key = 1 101
			key = 3 0.001
		}
	}
	EFFECTS
	{
		running
		{
			AUDIO_MULTI_POOL
			{
				channel = Ship
				transformName = RCSthruster
				clip = sound_rocket_mini
				volume = 0.0 0.0
				volume = 0.1 0.0
				volume = 0.5 0.025
				volume = 1.0 0.1
				pitch = 0.0 0.75
				pitch = 1.0 1.5
				loop = true
			}
			MODEL_MULTI_PARTICLE
			{
				modelName = Squad/FX/Monoprop_small
				transformName = RCSthruster
				emission = 0.0 0.0
				emission = 0.1 0.0
				emission = 1.0 1.0
				speed = 0.0 0.7
				speed = 1.0 1.0
				localRotation = -90, 0, 0
			}
		}
	}
	MODULE
	{
	name = ModuleScienceContainer
	
	reviewActionName = Review Data
	storeActionName = Store Experiments	
	collectActionName = Take Data
	
	evaOnlyStorage = False
	storageRange = 2
	
	allowRepeatedSubjects = True
	}
	MODULE
	{
		name = ModuleScienceExperiment	
	
		experimentID = crewReport
	
		experimentActionName = Probe Report
		resetActionName = Discard Probe Report
		reviewActionName = Review Report
	
		useStaging = False	
		useActionGroups = True
		hideUIwhenUnavailable = True	
		rerunnable = True
	
		xmitDataScalar = 1.0
	}
	MODULE
	{
		name = ModuleDataTransmitter
		antennaType = RELAY
		packetInterval = 0.17
		packetSize = 2
		packetResourceCost = 13.0
		requiredResource = ElectricCharge
		antennaPower = 4000000000
	}
	MODULE
	{

		name = ModuleDeployableSolarPanel
		animationName = SolarPanel
		sunTracking = false
		pivotName = sunPivotFixed
		raycastTransformName = suncatcher
		isBreakable = true
		breakName = SolarPanel
		breakForce = 50
		breakTorque = 50
		chargeRate = 1.8
	}
	MODULE
	{
		name = MuMechModuleHullCameraZoom
		cameraName = HXMT Photopolarimeter
		cameraForward = 0, 0, 0
		cameraUp = 0, 1, 0
		cameraPosition = 0.0, 1.5463, 0.814
		cameraFoVMax = 75
		cameraFoVMin = 10
	}
