@PART[hxmt_hard_xray_telescope]:NEEDS[RealFuels]:FINAL
{
    @mass = 0.5
    !RESOURCE,*{}
    !MODULE[ModuleFuelTanks] {}
    MODULE
    {

        name = ModuleFuelTanks
        type = ServiceModule
        volume = 200
        basemass = 0.05
        TANK
        {
            name = NTO
            amount = Full
            maxAmount = 50
        }
        TANK
        {
            name = MMH
            amount = Full
            maxAmount = 50
        }
        TANK
        {
            name = ElectricCharge
            amount = Full
            maxAmount = 2500
        }
    }
    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleRCS,*
        techLevel = 1
        origTechLevel = 1
        engineType = L
        origMass = -1
        configuration = MMH/NTO
        modded = false
        CONFIG
        {
            name = MMH/NTO
            thrusterPower = 0.1
            PROPELLANT
            {
                name = MMH
                ratio = 0.5
            }
            PROPELLANT
            {
                name = NTO
                ratio = 0.5
            }
            atmosphereCurve
            {
                key = 0 230
                key = 1 150
            }
        }
    }
    
}