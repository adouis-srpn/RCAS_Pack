
@PART[mozi_quantum_satellite]:NEEDS[Waterfall]
{
	!EFFECTS {}
	EFFECTS
	{
        running
		{
			AUDIO_MULTI_POOL
			{
				channel = Ship
				transformName = RCSthruster
				clip = sound_rocket_hard
				volume = 0.0 0.0
				volume = 0.1 0.0
				volume = 0.5 0.5
				volume = 1.0 0.5
				pitch = 0.0 0.75
				pitch = 1.0 1.5
			loop = true
			}
        }
    }

	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = dark_RCS
		engineID = basicRCS

		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
        CONTROLLER
        {
            name = rcs
            linkedTo = rcs
        }
		TEMPLATE
		{
			templateName = waterfall-rcs-jet-1
			overrideParentTransform = RCSthruster
        	position = 0.0,-0.003,0.0
        	rotation = 0, 0, 180
        	scale = 0.3, 0.3, 0.3
			@scale[*] *= #$/rescaleFactor$
			@scale[*] *= 1.66666667
		}
	}
}